version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - (io.Closer).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - text: "Error return value of `.*\\.Close` is not checked"
        linters:
          - errcheck
