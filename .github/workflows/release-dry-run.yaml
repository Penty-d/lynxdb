# .github/workflows/release-dry-run.yaml
#
# Validates release packaging and Homebrew formula rendering on pull requests.
# This workflow must not publish artifacts.

name: Release Dry Run

on:
  pull_request:
    paths:
      - ".goreleaser.yaml"
      - ".goreleaser-nightly.yaml"
      - ".github/workflows/release.yaml"
      - ".github/workflows/nightly-release.yaml"
      - ".github/workflows/nightly-trigger.yaml"
      - ".github/workflows/release-dry-run.yaml"
      - "scripts/generate-manifest.py"
      - "scripts/nightly-version.sh"
      - "scripts/render-homebrew-nightly.py"
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile.release"

permissions:
  contents: read
  packages: read

jobs:
  goreleaser-dry-run:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate stable GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: check --config .goreleaser.yaml

      - name: Validate nightly GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: check --config .goreleaser-nightly.yaml

      - name: Assert nightly config excludes stable outputs
        run: |
          if grep -Eq 'ghcr\.io/lynxbase/lynxdb:latest' .goreleaser-nightly.yaml; then
            echo "::error::nightly GoReleaser config must not publish Docker latest tags"
            exit 1
          fi
          if grep -Eq '^brews:' .goreleaser-nightly.yaml; then
            echo "::error::nightly GoReleaser config must not update Homebrew lynxdb"
            exit 1
          fi

      - name: Run stable GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: release --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: dry-run

      - name: Run nightly GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: release --snapshot --clean --config .goreleaser-nightly.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
