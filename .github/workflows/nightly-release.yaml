name: Nightly Release

on:
  push:
    tags:
      - "v*-nightly.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: Build & Publish Nightly
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if ! printf '%s\n' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9]{8}\.g[0-9a-fA-F]+$'; then
            echo "::error::Nightly release workflow only accepts vX.Y.Z-nightly.YYYYMMDD.gSHA tags"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing nightly version: $VERSION"

      - name: Capture Docker latest digest
        id: docker_latest_before
        run: |
          digest="$(docker buildx imagetools inspect ghcr.io/lynxbase/lynxdb:latest 2>/dev/null | sed -n 's/^Digest:[[:space:]]*//p' | head -1 || true)"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: check --config .goreleaser-nightly.yaml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: release --clean --config .goreleaser-nightly.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Docker latest unchanged
        if: steps.docker_latest_before.outputs.digest != ''
        env:
          BEFORE_DIGEST: ${{ steps.docker_latest_before.outputs.digest }}
        run: |
          after="$(docker buildx imagetools inspect ghcr.io/lynxbase/lynxdb:latest 2>/dev/null | sed -n 's/^Digest:[[:space:]]*//p' | head -1 || true)"
          if [ "$after" != "$BEFORE_DIGEST" ]; then
            echo "::error::Docker latest digest changed during nightly release"
            echo "before=$BEFORE_DIGEST"
            echo "after=$after"
            exit 1
          fi

      - name: Generate rsigma compatibility manifest
        run: make compat-manifest VERSION="${{ steps.meta.outputs.version }}"

      - name: Attach rsigma compatibility manifest
        run: gh release upload "${{ steps.meta.outputs.version }}" pkg/sigmaqueries/compat_manifest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage artifacts for CDN sync
        run: |
          mkdir -p cdn-artifacts
          cp dist/*.tar.gz cdn-artifacts/
          cp dist/*.zip cdn-artifacts/
          cp dist/checksums.txt cdn-artifacts/
          cp pkg/sigmaqueries/compat_manifest.json cdn-artifacts/

      - name: Upload artifacts for CDN sync
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-artifacts
          path: cdn-artifacts/*
          retention-days: 5

  cdn-sync:
    name: Sync Nightly to CDN
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-release-artifacts
          path: artifacts/

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload immutable nightly artifacts
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          rclone copy artifacts/ "r2:lynxdb-releases/${VERSION}/" \
            --include "*.tar.gz" \
            --include "*.zip" \
            --include "checksums.txt" \
            --progress

      - name: Generate and upload nightly manifests
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          python3 scripts/generate-manifest.py \
            --version "$VERSION" \
            --checksums artifacts/checksums.txt \
            --artifacts-dir artifacts/ \
            --base-url "https://dl.lynxdb.org" \
            --channel nightly \
            --output manifest.json

          rclone copyto manifest.json "r2:lynxdb-releases/${VERSION}/manifest.json"
          rclone copyto manifest.json "r2:lynxdb-releases/nightly/manifest.json"

      - name: Upload install.sh to CDN
        run: |
          rclone copyto scripts/install.sh "r2:lynxdb-releases/install.sh"

  homebrew:
    name: Update Homebrew Nightly
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-release-artifacts
          path: artifacts/

      - name: Render nightly formula
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          python3 scripts/render-homebrew-nightly.py \
            --version "$VERSION" \
            --checksums artifacts/checksums.txt \
            --base-url "https://dl.lynxdb.org" \
            --output Formula/lynxdb-nightly.rb

      - name: Push nightly formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lynxbase/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/lynxdb-nightly.rb tap/Formula/lynxdb-nightly.rb
          cd tap
          if git diff --quiet -- Formula/lynxdb-nightly.rb; then
            echo "Formula/lynxdb-nightly.rb already current"
            exit 0
          fi
          git config user.name "lynxdb-bot"
          git config user.email "bot@lynxdb.org"
          git add Formula/lynxdb-nightly.rb
          git commit -m "brew(lynxdb-nightly): update formula"
          git push origin main

  verify:
    name: Verify Nightly Endpoints
    needs:
      - goreleaser
      - cdn-sync
      - homebrew
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify public endpoints
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          curl -fsSL "https://dl.lynxdb.org/nightly/manifest.json" -o nightly-manifest.json
          curl -fsSL "https://dl.lynxdb.org/${VERSION}/manifest.json" -o version-manifest.json
          python3 -m json.tool nightly-manifest.json >/dev/null
          python3 -m json.tool version-manifest.json >/dev/null

          archive_url="$(python3 -c 'import json; manifest=json.load(open("nightly-manifest.json")); artifact=manifest["artifacts"].get("linux-amd64"); assert artifact, "linux-amd64 artifact missing"; print(artifact["url"])')"
          curl -fsSI "$archive_url" >/dev/null
          curl -fsSI "https://dl.lynxdb.org/${VERSION}/checksums.txt" >/dev/null

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}" > release.json
          python3 -c 'import json; release=json.load(open("release.json")); assert release.get("prerelease"), "nightly GitHub release is not marked prerelease"'

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [ "$latest_tag" = "$VERSION" ]; then
            echo "::error::GitHub latest points at nightly prerelease"
            exit 1
          fi

          docker buildx imagetools inspect ghcr.io/lynxbase/lynxdb:nightly >/dev/null

  retention:
    name: Retain Nightly Releases
    needs:
      - goreleaser
      - verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Delete old nightly releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate \
            --jq '.[] | select(.prerelease == true and (.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-nightly\\.[0-9]{8}\\.g[0-9a-fA-F]+$"))) | [.created_at, .id, .tag_name] | @tsv' \
            | sort -r > nightly-releases.tsv

          tail -n +15 nightly-releases.tsv > old-nightly-releases.tsv

          while IFS="$(printf '\t')" read -r _created_at release_id tag_name; do
            [ -n "$tag_name" ] || continue
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            git push origin ":refs/tags/${tag_name}"
            rclone purge "r2:lynxdb-releases/${tag_name}" || true
          done < old-nightly-releases.tsv
