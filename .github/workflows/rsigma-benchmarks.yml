name: rsigma Benchmarks

on:
  schedule:
    - cron: "42 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: rsigma compatibility benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Run benchmarks
        run: go test -run '^$' -bench='Benchmark(ParseGoldenCorpus|PlanGoldenCorpus|ExecuteRegexShape)$' -benchmem -count=5 ./pkg/sigmaqueries/... | tee rsigma-benchmarks.txt

      - name: Check regression budget
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          import statistics
          import sys

          # Gate on the architecture-independent `budget` column from
          # BENCHMARKS.md, not the M4 Pro p50 reference numbers. CI runners are
          # ~2-3x slower and noisy, so a tight relative comparison against
          # dev-machine p50 can never reliably pass; the budgets are absolute
          # ceilings sized to catch catastrophic (multi-x) regressions.
          budgets = {}
          row = re.compile(
              r"^\|\s*(Benchmark\S+)\s*\|\s*\d+\s*\|\s*\d+\s*\|\s*(<=?)\s*([0-9]+)\s*ns/op\s*\|"
          )
          with open("BENCHMARKS.md", encoding="utf-8") as f:
              for line in f:
                  match = row.match(line)
                  if match:
                      budgets[match.group(1)] = (match.group(2), int(match.group(3)))

          if not budgets:
              print("no benchmark budgets parsed from BENCHMARKS.md", file=sys.stderr)
              sys.exit(1)

          samples = {}
          bench = re.compile(r"^(Benchmark\S+?)(?:-\d+)?\s+\d+\s+([0-9.]+)\s+ns/op")
          with open("rsigma-benchmarks.txt", encoding="utf-8") as f:
              for line in f:
                  match = bench.match(line)
                  if match:
                      samples.setdefault(match.group(1), []).append(float(match.group(2)))

          failed = False
          for name, (op, limit) in sorted(budgets.items()):
              values = samples.get(name)
              if not values:
                  print(f"missing benchmark output for {name}", file=sys.stderr)
                  failed = True
                  continue
              current = statistics.median(values)
              over = current >= limit if op == "<" else current > limit
              status = "FAIL" if over else "ok"
              print(
                  f"{status}: {name} p50={current:.0f}ns/op "
                  f"budget {op} {limit}ns/op"
              )
              if over:
                  failed = True

          sys.exit(1 if failed else 0)
          PY

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: rsigma-benchmarks
          path: rsigma-benchmarks.txt
