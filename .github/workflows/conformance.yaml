name: Shipper Conformance

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    name: e2e matrix
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Build Web UI
        run: make webui

      - name: Run conformance matrix
        run: make test-conformance
