name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build site
        working-directory: docs/site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_PAGES_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy docs/site/build --project-name=lynxdb-docs --branch=main
