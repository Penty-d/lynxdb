name: Nightly Trigger

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base SemVer without v, for example 0.7.0"
        required: false

permissions:
  contents: write
  actions: write

concurrency:
  group: nightly-trigger
  cancel-in-progress: false

jobs:
  tag-nightly:
    name: Create Nightly Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check unreleased commits
        id: unreleased
        run: |
          LATEST_RELEASE_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' HEAD 2>/dev/null || true)"

          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous release tag found; continuing so nightly version validation can fail if needed"
            exit 0
          fi

          if git rev-list --max-count=1 "${LATEST_RELEASE_TAG}..HEAD" | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Found commits between ${LATEST_RELEASE_TAG} and main"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits between ${LATEST_RELEASE_TAG} and main; skipping nightly"
          fi

      - name: Set up mise
        if: steps.unreleased.outputs.has_changes == 'true'
        uses: jdx/mise-action@v3
        with:
          version: 2026.5.7
          install: true
          cache: true

      - name: Resolve nightly tag
        if: steps.unreleased.outputs.has_changes == 'true'
        id: nightly
        env:
          INPUT_BASE_VERSION: ${{ inputs.base_version }}
          VAR_BASE_VERSION: ${{ vars.NIGHTLY_BASE_VERSION }}
        run: |
          BASE_VERSION="${INPUT_BASE_VERSION:-$VAR_BASE_VERSION}"
          if [ -n "$BASE_VERSION" ]; then
            NIGHTLY_BASE_VERSION="$BASE_VERSION" CI=true scripts/nightly-version.sh > nightly.env
          else
            CI=true scripts/nightly-version.sh > nightly.env
          fi
          cat nightly.env
          cat nightly.env >> "$GITHUB_OUTPUT"

      - name: Check remote tag
        if: steps.unreleased.outputs.has_changes == 'true'
        id: existing_tag
        env:
          TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Nightly tag ${TAG} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Web UI
        if: steps.unreleased.outputs.has_changes == 'true' && steps.existing_tag.outputs.exists != 'true'
        run: make webui

      - name: Run preflight tests
        if: steps.unreleased.outputs.has_changes == 'true' && steps.existing_tag.outputs.exists != 'true'
        run: go test ./...

      - name: Validate nightly GoReleaser config
        if: steps.unreleased.outputs.has_changes == 'true' && steps.existing_tag.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "2.15.2"
          args: check --config .goreleaser-nightly.yaml

      - name: Push nightly tag
        if: steps.unreleased.outputs.has_changes == 'true' && steps.existing_tag.outputs.exists != 'true'
        env:
          TAG: ${{ steps.nightly.outputs.tag }}
        run: |
          git config user.name "lynxdb-bot"
          git config user.email "bot@lynxdb.org"
          git tag "$TAG"
          git push origin "refs/tags/${TAG}"

      - name: Dispatch nightly release
        if: steps.unreleased.outputs.has_changes == 'true' && steps.existing_tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.nightly.outputs.tag }}
        run: gh workflow run nightly-release.yaml --ref "$TAG"
