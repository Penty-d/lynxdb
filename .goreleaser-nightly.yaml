# .goreleaser-nightly.yaml
# GoReleaser configuration for LynxDB nightly prereleases.
# Stable releases use .goreleaser.yaml.

version: 2

project_name: lynxdb

before:
  hooks:
    - go mod tidy
    - bash -c "cd web && bun install && bun run build && rm -rf ../internal/webui/dist && cp -r dist ../internal/webui/dist"

builds:
  - id: lynxdb-gnu
    binary: lynxdb
    main: ./cmd/lynxdb/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Version={{.Version}}
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Date={{.Date}}
    flags:
      - -trimpath

  - id: lynxdb-musl
    binary: lynxdb
    main: ./cmd/lynxdb/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Version={{.Version}}
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/lynxbase/lynxdb/internal/buildinfo.Date={{.Date}}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    ids:
      - lynxdb-gnu
    formats: [tar.gz]
    name_template: >-
      lynxdb-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md*

  - id: musl
    ids:
      - lynxdb-musl
    formats: [tar.gz]
    name_template: >-
      lynxdb-v{{ .Version }}-{{ .Os }}-{{ .Arch }}-musl
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: true
  make_latest: false
  name_template: "LynxDB v{{ .Version }} nightly"
  header: |
    ## LynxDB v{{ .Version }} nightly

    ### Quick Install
    ```bash
    curl -fsSL https://lynxdb.org/install.sh | sh -s -- --channel nightly --allow-prerelease
    ```

    ### Checksums
    All artifacts are checksummed. Verify with:
    ```bash
    sha256sum -c checksums.txt
    ```
  footer: |
    ---
    **Full changelog**: https://github.com/lynxbase/lynxdb/compare/{{ .PreviousTag }}...{{ .Tag }}

dockers:
  - image_templates:
      - "ghcr.io/lynxbase/lynxdb:{{ .Version }}-amd64"
      - "ghcr.io/lynxbase/lynxdb:nightly-amd64"
      - "ghcr.io/lynxbase/lynxdb:sha-{{ .ShortCommit }}-amd64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/amd64"
    ids:
      - lynxdb-gnu
    goarch: amd64

  - image_templates:
      - "ghcr.io/lynxbase/lynxdb:{{ .Version }}-arm64"
      - "ghcr.io/lynxbase/lynxdb:nightly-arm64"
      - "ghcr.io/lynxbase/lynxdb:sha-{{ .ShortCommit }}-arm64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/arm64"
    ids:
      - lynxdb-gnu
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/lynxbase/lynxdb:{{ .Version }}"
    image_templates:
      - "ghcr.io/lynxbase/lynxdb:{{ .Version }}-amd64"
      - "ghcr.io/lynxbase/lynxdb:{{ .Version }}-arm64"
  - name_template: "ghcr.io/lynxbase/lynxdb:nightly"
    image_templates:
      - "ghcr.io/lynxbase/lynxdb:nightly-amd64"
      - "ghcr.io/lynxbase/lynxdb:nightly-arm64"
  - name_template: "ghcr.io/lynxbase/lynxdb:sha-{{ .ShortCommit }}"
    image_templates:
      - "ghcr.io/lynxbase/lynxdb:sha-{{ .ShortCommit }}-amd64"
      - "ghcr.io/lynxbase/lynxdb:sha-{{ .ShortCommit }}-arm64"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: "Features"
      regexp: "^feat"
    - title: "Bug Fixes"
      regexp: "^fix"
    - title: "Performance"
      regexp: "^perf"
    - title: "Other"
      order: 999
